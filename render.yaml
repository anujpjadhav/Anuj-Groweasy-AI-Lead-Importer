services:
  - type: web
    name: groweasy-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://groweasy-ai-lead-importer.vercel.app
